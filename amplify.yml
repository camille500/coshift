version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npx nuxt prepare
        - npx prisma generate
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .output
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .nuxt/**/*
