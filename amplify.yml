version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd site && npm ci
        - cd site && npx prisma generate
        - cd site && npx prisma db push
    build:
      commands:
        - cd site && npm run build
  artifacts:
    baseDirectory: site/dist
    files:
      - '**/*'
  cache:
    paths:
      - site/node_modules/**/*
