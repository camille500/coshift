version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --prefix site
        - npm run db:generate --prefix site
    build:
      commands:
        - npm run build --prefix site
  artifacts:
    baseDirectory: site/dist
    files:
      - '**/*'
  cache:
    paths:
      - site/node_modules/**/*
